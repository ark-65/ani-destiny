name: ani_destiny
description: AniDestiny is a non-profit Flutter anime discovery, playback and danmaku learning project.
publish_to: "none"
version: 1.0.4+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  dio: ^5.5.0
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  file_picker: ^8.0.6
  flutter_riverpod: ^2.5.1
  flutter_staggered_grid_view: ^0.7.0
  freezed_annotation: ^2.4.4
  go_router: ^14.2.0
  html: ^0.15.4
  intl: ^0.20.2
  json_annotation: ^4.9.0
  media_kit: ^1.1.11
  media_kit_libs_video: ^1.0.5
  media_kit_video: ^1.2.5
  path: ^1.9.0
  path_provider: ^2.1.4
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.3
  sqlite3_flutter_libs: ^0.5.24
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.4.11
  drift_dev: ^2.20.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/logo.png
    - assets/branding/
