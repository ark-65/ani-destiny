name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for AniDestiny. Please keep the request focused and describe the user problem first.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like AniDestiny to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there simpler approaches or workarounds?
  - type: checkboxes
    id: platform-impact
    attributes:
      label: Platform impact
      options:
        - label: Android
        - label: Windows
        - label: macOS
        - label: Linux
        - label: All platforms
        - label: Not platform-specific
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Blocking my use case
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, mockups, examples, or related links if helpful.
